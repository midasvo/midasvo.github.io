<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
	<meta name="description" content="{{ page.description | default: site.description }}">

	<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
	<meta property="og:description" content="{{ page.description | default: site.description }}">
	<meta property="og:url" content="{{ page.url | absolute_url }}">
	<meta property="og:type" content="website">
	<meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}">

	<meta name="twitter:card" content="summary_large_image">

	<link rel="preload" href="{{ '/assets/fonts/inter-variable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
	<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
	<link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
	<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
	<link rel="canonical" href="{{ page.url | absolute_url }}">
	<link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}">
	{% if page.inputbinder %}<link rel="stylesheet" href="{{ '/css/inputbinder.css' | relative_url }}">{% endif %}
	{% if page.math %}
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
	<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false}]});"></script>
	{% endif %}
	<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}" />
</head>
